<!DOCTYPE html>
<html>
<head>
  <title>Vishi Sharan</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url("IMG_5946.jpg") no-repeat center center/cover;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.3)
      );
    }

    /* TEXT (TOP POSITIONED) */
    .content {
      position: absolute;
      top: 18%; /* 👈 KEY FIX: consistent placement */
      text-align: center;
      color: white;
      z-index: 2;

      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.5s ease forwards;
    }

    .content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 70px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .content p {
      font-size: 18px;
      opacity: 0.85;
    }

    /* CARDS */
    .cards {
      position: absolute;
      bottom: 40px; /* 👈 slightly lower */
      display: grid;
      grid-template-columns: repeat(2, 240px);
      grid-template-rows: repeat(2, 120px);
      gap: 20px;
      z-index: 2;

      opacity: 0;
      transform: translateY(30px);
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 0.5s;
    }

    /* CARD STYLE */
    .card {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: rgba(255,255,255,0.32);
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: white;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }

    a {
      text-decoration: none;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media(max-width: 600px) {
      .content {
        top: 12%;
      }

      .content h1 {
        font-size: 42px;
      }

      .cards {
        grid-template-columns: 1fr;
        bottom: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="hero">

    <div class="overlay"></div>

    <!-- TEXT -->
    <div class="content">
      <h1>Hi, I’m Vishi</h1>
      <p>Mechanical developer at Ericsson</p>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <a href="cloud.html">
        <div class="card">
          <h3>Cloud Engineering</h3>
          <p>Google Cloud, APIs, Docker</p>
        </div>
      </a>

      <a href="programming.html">
        <div class="card">
          <h3>Programming</h3>
          <p>Interactive tools and applications</p>
        </div>
      </a>

      <a href="experience.html">
        <div class="card">
          <h3>Experience</h3>
          <p>Past experiences</p>
        </div>
      </a>

      <a href="about.html">
        <div class="card">
          <h3>About</h3>
          <p>Background, education and interests</p>
        </div>
      </a>

    </div>

  </div>

</body>
</html>
