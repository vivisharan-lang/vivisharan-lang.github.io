<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    /* 🔥 FORCE LEAFLET POPUP SIZE */
    .leaflet-popup-content {
      width: 420px !important;   /* 👈 KEY FIX */
      margin: 10px;
    }

    /* POPUP */
    .popup {
      width: 100%;
      text-align: center;
    }

    /* IMAGE */
    .popup img {
      width: 100%;
      height: 260px;            /* 👈 balanced size */
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
    }

    /* IMAGE CONTAINER */
    .image-container {
      position: relative;
    }

    /* ARROWS */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      font-size: 18px;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 50%;
    }

    .left { left: 8px; }
    .right { right: 8px; }

    /* BUTTONS */
    .popup button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .edit-btn { background: #3498db; color: white; }
    .delete-btn { background: #e74c3c; color: white; }

  </style>
</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA4gr4Esz5bOST3zHwQhfWbMVdHP9VYEvc",
  authDomain: "map-app-cc49d.firebaseapp.com",
  projectId: "map-app-cc49d",
  storageBucket: "map-app-cc49d.firebasestorage.app",
  messagingSenderId: "898386995342",
  appId: "1:898386995342:web:b8b1723535380b04a4c1df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 MAP
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// 📍 LOAD
async function loadPins() {
  const snapshot = await getDocs(collection(db, "pins"));

  snapshot.forEach(docSnap => {
    addMarker(docSnap.data(), docSnap.id);
  });
}

// 📌 MARKER
function addMarker(data, id) {

  let currentImage = 0;

  const marker = L.marker([data.lat, data.lng]).addTo(map);

  function renderPopup() {

    const hasImages = data.images && data.images.length > 0;

    const imageHTML = hasImages ? `
      <div class="image-container">
        <img src="${data.images[currentImage]}">

        ${data.images.length > 1 ? `
          <button class="arrow left" onclick="prevImage('${id}')">&#8592;</button>
          <button class="arrow right" onclick="nextImage('${id}')">&#8594;</button>
        ` : ""}
      </div>
    ` : "";

    marker.bindPopup(`
      <div class="popup">
        <b>${data.title}</b><br>
        ${data.text || ""}

        ${imageHTML}

        <button class="edit-btn" onclick="editPin('${id}')">Edit</button>
        <button class="delete-btn" onclick="deletePin('${id}')">Delete</button>
      </div>
    `, {
      maxWidth: 450   /* 👈 CRITICAL: controls popup size */
    });
  }

  renderPopup();

  window[`pin_${id}`] = {
    data,
    marker,
    renderPopup,
    currentImage
  };
}

// ➡️ NEXT
window.nextImage = function(id) {
  const pin = window[`pin_${id}`];
  pin.currentImage = (pin.currentImage + 1) % pin.data.images.length;
  pin.renderPopup();
};

// ⬅️ PREV
window.prevImage = function(id) {
  const pin = window[`pin_${id}`];
  pin.currentImage =
    (pin.currentImage - 1 + pin.data.images.length) % pin.data.images.length;
  pin.renderPopup();
};

// ➕ ADD
map.on("click", async function(e) {

  const title = prompt("Title:");
  const text = prompt("Description:");
  const images = prompt("Image URLs (comma separated):");

  if (!title) return;

  const pin = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title,
    text,
    images: images ? images.split(",") : []
  };

  try {
    const docRef = await addDoc(collection(db, "pins"), pin);
    addMarker(pin, docRef.id);
  } catch (error) {
    alert(error.message);
  }

});

// 🗑️ DELETE
window.deletePin = async function(id) {
  if (!confirm("Delete this pin?")) return;
  await deleteDoc(doc(db, "pins", id));
  location.reload();
};

// ✏️ EDIT
window.editPin = async function(id) {
  const pin = window[`pin_${id}`];

  const newTitle = prompt("New title:", pin.data.title);
  const newText = prompt("New description:", pin.data.text);
  const newImages = prompt("Image URLs:", pin.data.images.join(","));

  await updateDoc(doc(db, "pins", id), {
    title: newTitle,
    text: newText,
    images: newImages.split(",")
  });

  location.reload();
};

// START
loadPins();

</script>

</body>
</html>
