<!DOCTYPE html>
<html>
<head>
  <title>Travel Memory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #93A4C1;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .popup {
      font-family: 'Poppins', sans-serif;
    }

    .popup img {
      margin-top: 8px;
      border-radius: 8px;
      width: 180px;
    }

    .title {
      font-weight: 600;
      font-size: 16px;
    }

    .location {
      font-size: 12px;
      color: gray;
    }

  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  // 🔒 SET THIS
  const allowAddingPins = true; // change to false if you want only viewing

  let savedPins = JSON.parse(localStorage.getItem("pins")) || [];

  var map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  function addMarker(pin) {

    let imagesHTML = "";
    pin.images.forEach(img => {
      imagesHTML += `<img src="${img.trim()}"><br>`;
    });

    var popupContent = `
      <div class="popup">
        <div class="title">${pin.title}</div>
        <div class="location">${pin.city}, ${pin.country}</div>
        <p>${pin.text}</p>
        ${imagesHTML}
      </div>
    `;

    L.marker([pin.lat, pin.lng])
      .addTo(map)
      .bindPopup(popupContent);
  }

  // Load existing pins
  savedPins.forEach(pin => addMarker(pin));

  // Add new pins
  if (allowAddingPins) {

    map.on('click', async function(e) {

      var title = prompt("Place name:");
      var text = prompt("Memory:");
      var images = prompt("Image URLs (comma separated):");

      if (!title) return;

      // 🌍 Get city name
      let response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
      let data = await response.json();

      let city = data.address.city || data.address.town || data.address.village || "Unknown";
      let country = data.address.country || "";

      var newPin = {
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        title: title,
        text: text,
        images: images.split(","),
        city: city,
        country: country
      };

      savedPins.push(newPin);
      localStorage.setItem("pins", JSON.stringify(savedPins));

      addMarker(newPin);

    });

  }

</script>

</body>
</html>
