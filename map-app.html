<!DOCTYPE html>
<html>
<head>
  <title>Travel Memory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #93A4C1;
    }

    #map {
      height: 100vh;
    }

    .popup {
      width: 240px;
    }

    .popup-title {
      font-weight: 600;
      font-size: 16px;
    }

    .popup-location {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }

    .popup-text {
      font-size: 13px;
      margin-bottom: 10px;
    }

    .slider img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
    }

    .slider img.active {
      display: block;
    }

    .arrow {
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
    }

    .btn {
      margin-top: 5px;
      padding: 6px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #B1B2AE;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const allowAddingPins = true;

let savedPins = JSON.parse(localStorage.getItem("pins")) || [];

var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

var customIcon = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
  iconSize: [30, 30]
});

// SLIDER
function createSlider(images, id) {
  return `
    <div class="slider" id="slider-${id}">
      ${images.map((img, i) =>
        `<img src="${img.trim()}" class="${i === 0 ? 'active' : ''}">`
      ).join("")}
      ${images.length > 1 ? `
        <button class="arrow" onclick="changeSlide(${id}, -1)">◀</button>
        <button class="arrow" onclick="changeSlide(${id}, 1)">▶</button>
      ` : ""}
    </div>
  `;
}

function changeSlide(id, dir) {
  let slider = document.getElementById("slider-" + id);
  let imgs = slider.querySelectorAll("img");
  let index = [...imgs].findIndex(img => img.classList.contains("active"));

  imgs[index].classList.remove("active");
  index = (index + dir + imgs.length) % imgs.length;
  imgs[index].classList.add("active");
}

// ADD MARKER
function addMarker(pin, index) {

  let images = pin.images || [];

  let popupContent = `
    <div class="popup">
      <div class="popup-title">${pin.title}</div>
      <div class="popup-location">${pin.city || ""}, ${pin.country || ""}</div>
      <div class="popup-text">${pin.text}</div>

      ${createSlider(images, index)}

      <button class="btn" onclick="editPin(${index})">Edit</button>
      <button class="btn" onclick="deletePin(${index})">Delete</button>
    </div>
  `;

  L.marker([pin.lat, pin.lng], {icon: customIcon})
    .addTo(map)
    .bindPopup(popupContent);
}

// LOAD PINS
savedPins.forEach((pin, index) => addMarker(pin, index));

// DELETE
function deletePin(index) {
  if (!confirm("Delete this pin?")) return;

  savedPins.splice(index, 1);
  localStorage.setItem("pins", JSON.stringify(savedPins));
  location.reload();
}

// ✏️ EDIT
function editPin(index) {

  let pin = savedPins[index];

  let newTitle = prompt("Edit title:", pin.title);
  let newText = prompt("Edit text:", pin.text);
  let newImages = prompt("Edit images (comma separated):", pin.images.join(","));

  if (!newTitle) return;

  savedPins[index] = {
    ...pin,
    title: newTitle,
    text: newText,
    images: newImages.split(",")
  };

  localStorage.setItem("pins", JSON.stringify(savedPins));
  location.reload();
}

// ADD NEW PIN
if (allowAddingPins) {
  map.on('click', async function(e) {

    let title = prompt("Place name:");
    let text = prompt("Memory:");
    let images = prompt("Image URLs (comma separated):");

    if (!title) return;

    let city = "Unknown";
    let country = "";

    try {
      let res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`
      );
      let data = await res.json();

      city = data.address?.city || data.address?.town || data.address?.village || "Unknown";
      country = data.address?.country || "";
    } catch {}

    let newPin = {
      lat: e.latlng.lat,
      lng: e.latlng.lng,
      title,
      text,
      images: images.split(","),
      city,
      country
    };

    savedPins.push(newPin);
    localStorage.setItem("pins", JSON.stringify(savedPins));

    location.reload();
  });
}

</script>

</body>
</html>
