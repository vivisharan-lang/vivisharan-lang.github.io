<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .popup img {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCyiFRwisqOTm-Ofu8F6LBBEdc3xRIzaYs",
  authDomain: "travel-map-af023.firebaseapp.com",
  projectId: "travel-map-af023"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌍 MAP (ENGLISH)
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// 📍 LOAD PINS
function loadPins() {
  db.collection("pins").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();
      addMarker(data);
    });
  });
}

// 📌 ADD MARKER FUNCTION
function addMarker(data) {
  let imagesHTML = "";

  if (data.images && data.images.length > 0) {
    data.images.forEach(img => {
      imagesHTML += `<img src="${img}">`;
    });
  }

  L.marker([data.lat, data.lng])
    .addTo(map)
    .bindPopup(`
      <div class="popup">
        <b>${data.title}</b><br>
        ${data.text}
        ${imagesHTML}
      </div>
    `);
}

// ➕ ADD PIN
map.on("click", function(e) {

  const title = prompt("Title:");
  const text = prompt("Description:");
  const images = prompt("Image URLs (comma separated):");

  if (!title) return;

  const pin = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title: title,
    text: text,
    images: images ? images.split(",") : []
  };

  // SAVE TO FIREBASE
  db.collection("pins").add(pin)
  .then(() => {
    addMarker(pin); // 👈 SHOW IMMEDIATELY
  })
  .catch(error => {
    console.error("Error:", error);
    alert("Something went wrong");
  });

});

// START
loadPins();

</script>

</body>
</html>
