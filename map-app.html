<!DOCTYPE html>
<html>
<head>
  <title>Travel Memory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #93A4C1;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* Popup styling */
    .popup {
      font-family: 'Poppins', sans-serif;
      max-width: 220px;
    }

    .popup-title {
      font-weight: 600;
      font-size: 16px;
    }

    .popup-location {
      font-size: 12px;
      color: #555;
      margin-bottom: 5px;
    }

    .popup-text {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .popup img {
      width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    /* Floating info box */
    .info-box {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #D3DFF2;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-size: 14px;
      z-index: 1000;
    }

  </style>
</head>

<body>

<div class="info-box">
  🌍 Click anywhere to add a memory
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  // 🔒 Set to false before publishing
  const allowAddingPins = true;

  let savedPins = JSON.parse(localStorage.getItem("pins")) || [];

  var map = L.map('map').setView([20, 0], 2);

  // 🌍 English-style clean map
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB'
  }).addTo(map);

  // 📍 Custom marker icon
  var customIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [30, 30]
  });

  function addMarker(pin) {

    let imagesHTML = "";

    pin.images.forEach(img => {
      imagesHTML += `<img src="${img.trim()}">`;
    });

    var popupContent = `
      <div class="popup">
        <div class="popup-title">${pin.title}</div>
        <div class="popup-location">${pin.city}, ${pin.country}</div>
        <div class="popup-text">${pin.text}</div>
        ${imagesHTML}
      </div>
    `;

    L.marker([pin.lat, pin.lng], {icon: customIcon})
      .addTo(map)
      .bindPopup(popupContent);
  }

  // Load pins
  savedPins.forEach(pin => addMarker(pin));

  // Add pins
  if (allowAddingPins) {

    map.on('click', async function(e) {

      var title = prompt("Place name:");
      var text = prompt("Memory:");
      var images = prompt("Image URLs (comma separated):");

      if (!title) return;

      // 🌍 Get city + country
      let response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`
      );

      let data = await response.json();

      let city = data.address.city || data.address.town || data.address.village || "Unknown";
      let country = data.address.country || "";

      var newPin = {
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        title: title,
        text: text,
        images: images.split(","),
        city: city,
        country: country
      };

      savedPins.push(newPin);
      localStorage.setItem("pins", JSON.stringify(savedPins));

      addMarker(newPin);

    });

  }

</script>

</body>
</html>
