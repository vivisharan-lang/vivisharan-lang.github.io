<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .popup {
      max-width: 420px; /* 👈 BIGGER POPUP */
      font-size: 14px;
    }

    .popup img {
      width: 100%;
      height: 300px; /* 👈 MUCH BIGGER IMAGE */
      object-fit: contain; /* 👈 NO CROPPING */
      background: #000; /* 👈 nice background for empty space */
      border-radius: 12px;
      margin-top: 10px;
    }

    .popup button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .edit-btn { background: #3498db; color: white; }
    .delete-btn { background: #e74c3c; color: white; }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA4gr4Esz5bOST3zHwQhfWbMVdHP9VYEvc",
  authDomain: "map-app-cc49d.firebaseapp.com",
  projectId: "map-app-cc49d",
  storageBucket: "map-app-cc49d.firebasestorage.app",
  messagingSenderId: "898386995342",
  appId: "1:898386995342:web:b8b1723535380b04a4c1df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 Map
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// 📍 LOAD PINS
async function loadPins() {
  const snapshot = await getDocs(collection(db, "pins"));

  snapshot.forEach(docSnap => {
    addMarker(docSnap.data(), docSnap.id);
  });
}

// 📌 ADD MARKER
function addMarker(data, id) {
  let currentImage = 0;

  function getImageHTML() {
    if (!data.images || data.images.length === 0) return "";
    return `<img src="${data.images[currentImage]}">`;
  }

  const marker = L.marker([data.lat, data.lng]).addTo(map);

  function updatePopup() {
    marker.bindPopup(`
      <div class="popup">
        <b>${data.title}</b><br>
        ${data.text || ""}

        ${getImageHTML()}

        <button onclick="nextImage('${id}')">Next Image</button>

        <button class="edit-btn" onclick="editPin('${id}')">Edit</button>
        <button class="delete-btn" onclick="deletePin('${id}')">Delete</button>
      </div>
    `);
  }

  updatePopup();

  window[`pin_${id}`] = {
    data,
    marker,
    updatePopup,
    currentImage
  };
}

// ➕ ADD PIN
map.on("click", async function(e) {

  const title = prompt("Title:");
  const text = prompt("Description:");
  const images = prompt("Image URLs (comma separated):");

  if (!title) return;

  const pin = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title,
    text,
    images: images ? images.split(",") : []
  };

  try {
    const docRef = await addDoc(collection(db, "pins"), pin);
    addMarker(pin, docRef.id);
  } catch (error) {
    alert(error.message);
  }

});

// 🖼️ NEXT IMAGE
window.nextImage = function(id) {
  const pinObj = window[`pin_${id}`];

  if (!pinObj.data.images || pinObj.data.images.length === 0) return;

  pinObj.currentImage =
    (pinObj.currentImage + 1) % pinObj.data.images.length;

  pinObj.updatePopup();
};

// 🗑️ DELETE PIN
window.deletePin = async function(id) {
  if (!confirm("Delete this pin?")) return;

  await deleteDoc(doc(db, "pins", id));
  location.reload();
};

// ✏️ EDIT PIN
window.editPin = async function(id) {
  const pinObj = window[`pin_${id}`];
  const data = pinObj.data;

  const newTitle = prompt("New title:", data.title);
  const newText = prompt("New description:", data.text);
  const newImages = prompt("Image URLs:", data.images.join(","));

  await updateDoc(doc(db, "pins", id), {
    title: newTitle,
    text: newText,
    images: newImages.split(",")
  });

  location.reload();
};

// START
loadPins();

</script>

</body>
</html>
