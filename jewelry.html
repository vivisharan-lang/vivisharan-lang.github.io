<!DOCTYPE html>
<html>
<head>
  <title>Vivi's Studio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #f8f8f8;
      color: #222;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #eaeef5;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    .hero h1 {
      font-size: 50px;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .hero p {
      margin-top: 10px;
      color: #666;
    }

    /* GALLERY */
    .gallery {
      padding: 80px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      cursor: pointer;
    }

    .item img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .item:hover img {
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      color: white;
      opacity: 0;
      transition: 0.4s;
    }

    .item:hover .overlay {
      opacity: 1;
    }

    /* FULLSCREEN VIEW */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 80%;
      max-height: 80%;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }

  </style>
</head>

<body>

<section class="hero">
  <h1>Vivi’s Studio</h1>
  <p>Handmade jewelry & creative expression</p>
</section>

<section class="gallery">

  <div class="item" onclick="openImage(this)">
    <img src="YOUR_IMAGE_URL">
    <div class="overlay">Handmade Bracelet</div>
  </div>

  <div class="item" onclick="openImage(this)">
    <img src="YOUR_IMAGE_URL">
    <div class="overlay">Custom Piece</div>
  </div>

</section>

<div class="lightbox" id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<div class="footer">
  Follow on Instagram: @vivisstudio
</div>

<script>
function openImage(element) {
  const img = element.querySelector("img").src;
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
