<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* POPUP */
    .popup {
      max-width: 300px;
    }

    .popup h3 {
      margin: 0;
    }

    .popup p {
      font-size: 14px;
      color: #555;
    }

    /* SLIDESHOW */
    .slider {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      margin-top: 10px;
    }

    .slides {
      display: flex;
      transition: transform 0.4s ease;
    }

    .slides img {
      width: 100%;
      flex-shrink: 0;
      border-radius: 10px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .left { left: 5px; }
    .right { right: 5px; }

  </style>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div id="map"></div>

<script>
  // 🔐 ADMIN MODE (set to true if YOU want to add pins)
  const isAdmin = false;

  // 🌍 MAP
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // 📍 PINS (THIS IS YOUR DATABASE)
  const pins = [
    {
      lat: 37.5665,
      lng: 126.9780,
      title: "Seoul",
      text: "Amazing food and memories 💕",
      images: [
        "https://i.imgur.com/yourimage1.jpg",
        "https://i.imgur.com/yourimage2.jpg"
      ]
    }
  ];

  // 🧱 CREATE POPUP
  function createPopup(pin) {
    const div = document.createElement("div");
    div.className = "popup";

    div.innerHTML = `
      <h3>${pin.title}</h3>
      <p>${pin.text}</p>
    `;

    // SLIDESHOW
    if (pin.images.length > 0) {
      let index = 0;

      const slider = document.createElement("div");
      slider.className = "slider";

      const slides = document.createElement("div");
      slides.className = "slides";

      pin.images.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        slides.appendChild(img);
      });

      const left = document.createElement("button");
      left.innerHTML = "‹";
      left.className = "arrow left";

      const right = document.createElement("button");
      right.innerHTML = "›";
      right.className = "arrow right";

      function updateSlide() {
        slides.style.transform = `translateX(-${index * 100}%)`;
      }

      left.onclick = () => {
        index = (index - 1 + pin.images.length) % pin.images.length;
        updateSlide();
      };

      right.onclick = () => {
        index = (index + 1) % pin.images.length;
        updateSlide();
      };

      slider.appendChild(slides);
      slider.appendChild(left);
      slider.appendChild(right);

      div.appendChild(slider);
    }

    return div;
  }

  // 📍 LOAD PINS
  pins.forEach(pin => {
    L.marker([pin.lat, pin.lng])
      .addTo(map)
      .bindPopup(createPopup(pin));
  });

  // ➕ ADD PINS (ONLY IF ADMIN)
  if (isAdmin) {
    map.on("click", function(e) {
      const title = prompt("Title:");
      const text = prompt("Description:");
      const image = prompt("Image URL:");

      if (!title) return;

      const newPin = {
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        title,
        text,
        images: [image]
      };

      pins.push(newPin);
      location.reload();
    });
  }
</script>

</body>
</html>
