<!DOCTYPE html>
<html>
<head>
  <title>Cloud Projects</title>

  <!-- SAME FONTS AS HOMEPAGE -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: white;
    }

    /* SAME HERO BACKGROUND */
    .hero {
      min-height: 100vh;
      background: url("IMG_5946.jpg") no-repeat center center/cover;
      position: relative;
      padding: 60px 20px;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.4)
      );
      top: 0;
      left: 0;
    }

    /* CONTENT */
    .content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: auto;
    }

    /* TITLE */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 50px;
      margin-bottom: 40px;
      text-align: center;
    }

    /* CARD */
    .card {
      background: rgba(255, 255, 255, 0.35); /* 👈 LESS TRANSPARENT */
      backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.45);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 10px;
      color: white;
    }

    .card p {
      color: rgba(255,255,255,0.9);
      margin-bottom: 15px;
    }

    /* LINK */
    a {
      color: white;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* BACK BUTTON (nice addition) */
    .back {
      display: inline-block;
      margin-bottom: 30px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<div class="hero">

  <div class="overlay"></div>

  <div class="content">

    <a href="index.html" class="back">← Back</a>

    <h1>Cloud Projects</h1>

    <div class="card">
      <h2>Cloud Network Monitoring API</h2>
      <p>Built with Flask, Docker, and deployed on Google Cloud Run.</p>
      <a href="network-api.html">View Project →</a>
    </div>

  </div>

</div>

</body>
</html>
