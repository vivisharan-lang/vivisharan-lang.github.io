<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- STYLE -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- FIREBASE (STABLE VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCyiFRwisqOTm-Ofu8F6LBBEdc3xRIzaYs",
  authDomain: "travel-map-af023.firebaseapp.com",
  projectId: "travel-map-af023"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌍 MAP (ENGLISH VERSION)
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & CartoDB'
}).addTo(map);

// 📍 LOAD PINS
function loadPins() {
  db.collection("pins").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();

      L.marker([data.lat, data.lng])
        .addTo(map)
        .bindPopup(`<b>${data.title}</b><br>${data.text}`);
    });
  }).catch(error => {
    console.error("Error loading pins:", error);
  });
}

// ➕ ADD PIN
map.on("click", function(e) {

  const title = prompt("Title:");
  const text = prompt("Description:");

  if (!title) return;

  db.collection("pins").add({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title: title,
    text: text
  })
  .then(() => {
    alert("Pin saved!");
    location.reload();
  })
  .catch(error => {
    console.error("Error saving pin:", error);
    alert("Error saving pin");
  });

});

// START
loadPins();

</script>

</body>
</html>
