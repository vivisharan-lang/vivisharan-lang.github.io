<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .popup img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn {
      margin-top: 8px;
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .edit { background: #d3dff2; }
    .delete { background: #f2b3b3; }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCyiFRwisqOTm-Ofu8F6LBBEdc3xRIzaYs",
  authDomain: "travel-map-af023.firebaseapp.com",
  projectId: "travel-map-af023",
  storageBucket: "travel-map-af023.firebasestorage.app",
  messagingSenderId: "277891709023",
  appId: "1:277891709023:web:24e2003a4959ffea7d83ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 ENGLISH MAP (FIXED)
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 📍 LOAD PINS
async function loadPins() {
  const querySnapshot = await getDocs(collection(db, "pins"));

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const marker = L.marker([data.lat, data.lng]).addTo(map);

    let imagesHTML = "";
    if (data.images && data.images.length > 0) {
      data.images.forEach(img => {
        imagesHTML += `<img src="${img}">`;
      });
    }

    marker.bindPopup(`
      <div class="popup">
        <h3>${data.title}</h3>
        <p>${data.text}</p>
        ${imagesHTML}
        <br>
        <button class="btn edit" onclick="editPin('${id}', '${data.title}', '${data.text}', '${data.images}')">Edit</button>
        <button class="btn delete" onclick="deletePin('${id}')">Delete</button>
      </div>
    `);
  });
}

// ➕ ADD PIN
map.on("click", async (e) => {
  const title = prompt("Title:");
  const text = prompt("Description:");
  const images = prompt("Image URLs (comma separated):");

  if (!title) return;

  await addDoc(collection(db, "pins"), {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title,
    text,
    images: images ? images.split(",") : []
  });

  location.reload();
});

// ✏️ EDIT
window.editPin = async (id, oldTitle, oldText, oldImages) => {
  const title = prompt("New title:", oldTitle);
  const text = prompt("New text:", oldText);
  const images = prompt("New images:", oldImages);

  await updateDoc(doc(db, "pins", id), {
    title,
    text,
    images: images.split(",")
  });

  location.reload();
};

// 🗑 DELETE
window.deletePin = async (id) => {
  await deleteDoc(doc(db, "pins", id));
  location.reload();
};

// START
loadPins();

</script>

</body>
</html>
