<!DOCTYPE html>
<html>
<head>
  <title>Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .popup img {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script type="module">

// 🔥 Firebase (MODERN VERSION)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ YOUR CONFIG (CORRECT)
const firebaseConfig = {
  apiKey: "AIzaSyA4gr4Esz5bOST3zHwQhfWbMVdHP9VYEvc",
  authDomain: "map-app-cc49d.firebaseapp.com",
  projectId: "map-app-cc49d",
  storageBucket: "map-app-cc49d.firebasestorage.app",
  messagingSenderId: "898386995342",
  appId: "1:898386995342:web:b8b1723535380b04a4c1df"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 Map
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// 📍 Load pins
async function loadPins() {
  const querySnapshot = await getDocs(collection(db, "pins"));

  querySnapshot.forEach((doc) => {
    addMarker(doc.data());
  });
}

// 📌 Add marker
function addMarker(data) {
  let imagesHTML = "";

  if (data.images && data.images.length > 0) {
    data.images.forEach(img => {
      imagesHTML += `<img src="${img}">`;
    });
  }

  L.marker([data.lat, data.lng])
    .addTo(map)
    .bindPopup(`
      <div class="popup">
        <b>${data.title}</b><br>
        ${data.text || ""}
        ${imagesHTML}
      </div>
    `);
}

// ➕ Add pin
map.on("click", async function(e) {

  const title = prompt("Title:");
  const text = prompt("Description:");
  const images = prompt("Image URLs (comma separated):");

  if (!title) return;

  const pin = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title: title,
    text: text,
    images: images ? images.split(",") : []
  };

  try {
    await addDoc(collection(db, "pins"), pin);
    addMarker(pin); // instant display
  } catch (error) {
    console.error("FULL ERROR:", error);
    alert(error.message);
  }

});

// Start
loadPins();

</script>

</body>
</html>
