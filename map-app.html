<!DOCTYPE html>
<html>
<head>
  <title>Travel Memory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #93A4C1;
    }

    #map {
      height: 100vh;
    }

    .info-box {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #D3DFF2;
      padding: 12px 16px;
      border-radius: 10px;
      z-index: 1000;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* POPUP CARD */
    .popup {
      width: 240px;
    }

    .popup-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .popup-location {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .popup-text {
      font-size: 13px;
      margin-bottom: 10px;
    }

    /* SLIDER */
    .slider {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      border-radius: 10px;
    }

    .slider img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: none;
    }

    .slider img.active {
      display: block;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 5px;
    }

    .left {
      left: 5px;
    }

    .right {
      right: 5px;
    }

    .delete-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px;
      background: #B1B2AE;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="info-box">
  🌍 Click map to add memory
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const allowAddingPins = true;

let savedPins = JSON.parse(localStorage.getItem("pins")) || [];

var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

var customIcon = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
  iconSize: [30, 30]
});

function createSlider(images, id) {
  let imgs = images.map((img, i) => 
    `<img src="${img.trim()}" class="${i === 0 ? 'active' : ''}">`
  ).join("");

  return `
    <div class="slider" id="slider-${id}">
      ${imgs}
      ${images.length > 1 ? `
        <button class="arrow left" onclick="changeSlide('${id}', -1)">◀</button>
        <button class="arrow right" onclick="changeSlide('${id}', 1)">▶</button>
      ` : ''}
    </div>
  `;
}

function changeSlide(id, direction) {
  let slider = document.getElementById("slider-" + id);
  let imgs = slider.querySelectorAll("img");
  let index = [...imgs].findIndex(img => img.classList.contains("active"));

  imgs[index].classList.remove("active");
  index = (index + direction + imgs.length) % imgs.length;
  imgs[index].classList.add("active");
}

function addMarker(pin, index) {

  let images = pin.images || [pin.image];

  let slider = createSlider(images, index);

  let popupContent = `
    <div class="popup">
      <div class="popup-title">${pin.title}</div>
      <div class="popup-location">${pin.city || ""}, ${pin.country || ""}</div>
      <div class="popup-text">${pin.text}</div>
      ${slider}
      <button class="delete-btn" onclick="deletePin(${index})">Delete</button>
    </div>
  `;

  L.marker([pin.lat, pin.lng], {icon: customIcon})
    .addTo(map)
    .bindPopup(popupContent);
}

// Load pins
savedPins.forEach((pin, index) => addMarker(pin, index));

function deletePin(index) {
  if (!confirm("Delete this pin?")) return;

  savedPins.splice(index, 1);
  localStorage.setItem("pins", JSON.stringify(savedPins));
  location.reload();
}

// Add new pin
if (allowAddingPins) {
  map.on('click', async function(e) {

    let title = prompt("Place name:");
    let text = prompt("Memory:");
    let images = prompt("Image URLs (comma separated):");

    if (!title) return;

    let city = "Unknown";
    let country = "";

    try {
      let res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`
      );
      let data = await res.json();

      city = data.address.city || data.address.town || data.address.village || "Unknown";
      country = data.address.country || "";
    } catch {}

    let newPin = {
      lat: e.latlng.lat,
      lng: e.latlng.lng,
      title,
      text,
      images: images.split(","),
      city,
      country
    };

    savedPins.push(newPin);
    localStorage.setItem("pins", JSON.stringify(savedPins));

    addMarker(newPin, savedPins.length - 1);
  });
}

</script>

</body>
</html>
